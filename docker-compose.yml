# Self-contained agent stack: Mastra (server + Studio) + Postgres/pgvector + Dolt.
# One `docker compose up` brings up a complete, portable agent. Deploys as a
# single Coolify "Docker Compose" resource (only `mastra` gets a public domain;
# postgres + dolt stay private on the internal network).
#
#   postgres = RAG vectors (pgvector) + Mastra memory      [volume pgdata]
#   dolt     = versioned business data the agents produce  [volume doltdata]
#
# Secrets come from .env / Coolify env (never commit them):
#   APP_SECRET, POSTGRES_PASSWORD, DOLT_PASSWORD, an LLM key, and MASTRA_JWT_SECRET.
#   See .env.example.

services:
  mastra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mastra
    restart: unless-stopped
    # `expose` (not `ports`) — Coolify routes the public domain via Traefik on the
    # internal network; publishing a host port collides with other deploys on the
    # same host. For local host access use docker-compose.override.yml (ports).
    expose:
      - "4111"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # RAG vectors + Mastra memory → the postgres service (private, internal network)
      - SUPABASE_DB_URL=postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      # Versioned business data → the dolt service (private, internal network)
      - DOLT_HOST=dolt
      - DOLT_PORT=3306
      - DOLT_USER=root
      - DOLT_PASSWORD=${DOLT_PASSWORD}
      - DOLT_DATABASE=${DOLT_DATABASE:-appdb}
    depends_on:
      postgres:
        condition: service_healthy
      dolt:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4111/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # enables the `vector` extension on first init
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    # no published port → reachable only as `postgres` on the internal network

  dolt:
    image: dolthub/dolt-sql-server:latest
    restart: unless-stopped
    environment:
      # allow root from any host on the internal network (default is localhost-only,
      # which denies the mastra container). Applied on first init only.
      - DOLT_ROOT_HOST=%
      - DOLT_ROOT_PASSWORD=${DOLT_PASSWORD}
    volumes:
      - doltdata:/var/lib/dolt # versioned DB + full commit history (persist!)
    healthcheck:
      test: ["CMD-SHELL", "dolt sql -q 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    # no published port → reachable only as `dolt` on the internal network

volumes:
  pgdata: {}
  doltdata: {}
